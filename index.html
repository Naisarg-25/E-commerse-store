<!DOCTYPE html>
<html>
<head>
  <title>Mini Store</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #f5f7ff 0%, #eef2ff 100%);
      color: #1f2937;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
    }
    .hero h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    .auth-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input, textarea, button {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background: #4f46e5;
      color: white;
      border: none;
      transition: 0.2s ease;
    }
    button:hover {
      background: #4338ca;
    }
    .secondary-btn {
      background: #10b981;
    }
    .secondary-btn:hover {
      background: #059669;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }
    .product {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }
    .product h3 {
      margin-top: 0;
    }
    .price {
      font-weight: bold;
      color: #4f46e5;
      margin: 10px 0;
    }
    .hidden {
      display: none;
    }
    #cart {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      margin-top: 12px;
      min-height: 60px;
    }
    #message {
      min-height: 22px;
      font-weight: 600;
      margin: 8px 0 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Mini Online Store</h1>
      <p>Sign up or log in to explore products, add your own items, and manage your cart.</p>
    </div>

    <div id="message"></div>

    <div id="auth-grid">
      <div class="card">
        <h2>Signup</h2>
        <form id="signupForm">
          <input id="signupName" placeholder="Name" required>
          <input id="signupEmail" type="email" placeholder="Email" required>
          <input id="signupPass" type="password" placeholder="Password" required>
          <button type="submit">Signup</button>
        </form>
      </div>

      <div class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <input id="loginEmail" type="email" placeholder="Email" required>
          <input id="loginPass" type="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
      </div>
    </div>

    <div  id="dashboardPanel" style="display: none;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
        <h2 style="margin:0;">Manage Store</h2>
        <button onclick="logout()" class="secondary-btn">Logout</button>
      </div>

      <h3>Add Product</h3>
      <form id="addProductForm">
        <input id="productName" placeholder="Product name" required>
        <input id="productPrice" type="number" placeholder="Price" required>
        <textarea id="productDescription" placeholder="Description"></textarea>
        <button type="submit">Add Product</button>
      </form>
    

      <div class="card" style="margin-top:20px;">
        <h2>Products</h2>
        <div id="products" class="products-grid"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Cart</h2>
        <div id="cart"></div>
        <button onclick="checkout()" style="margin-top:12px;">Checkout</button>
      </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
